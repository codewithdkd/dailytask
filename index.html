<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:
linear-gradient(135deg,#0f172a,#1e293b,#312e81);
min-height:100vh;
padding:40px;
color:white;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:35px;
}

.container{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.clock{
background:rgba(255,255,255,.08);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.15);
padding:28px;
border-radius:25px;

box-shadow:
0 15px 40px rgba(0,0,0,.3);

transition:.3s;
}

.clock:hover{
transform:translateY(-6px);
}

.city{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.zone{
opacity:.8;
margin-bottom:18px;
}

.time{
font-size:54px;
font-weight:800;
letter-spacing:2px;
}

.ampm{
font-size:22px;
color:#60a5fa;
}

.date{
margin-top:14px;
opacity:.8;
font-size:16px;
}

</style>
</head>

<body>

<h1>🌎 World Time Dashboard</h1>

<div class="container">

<div class="clock">
<div class="city">🇮🇳 India</div>
<div class="zone">IST</div>
<div class="time" id="india"></div>
<div class="date" id="indiaDate"></div>
</div>

<div class="clock">
<div class="city">🇺🇸 New York</div>
<div class="zone">Eastern Time</div>
<div class="time" id="ny"></div>
<div class="date" id="nyDate"></div>
</div>

<div class="clock">
<div class="city">🇺🇸 Chicago</div>
<div class="zone">Central Time</div>
<div class="time" id="chi"></div>
<div class="date" id="chiDate"></div>
</div>

<div class="clock">
<div class="city">🇺🇸 Denver</div>
<div class="zone">Mountain Time</div>
<div class="time" id="den"></div>
<div class="date" id="denDate"></div>
</div>

<div class="clock">
<div class="city">🇺🇸 Los Angeles</div>
<div class="zone">Pacific Time</div>
<div class="time" id="la"></div>
<div class="date" id="laDate"></div>
</div>

</div>

<script>

function updateClock(id,dateId,zone){

let now=new Date();

let options={
timeZone:zone,
hour:'2-digit',
minute:'2-digit',
second:'2-digit',
hour12:true
};

let dateOptions={
timeZone:zone,
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
};

let t=now.toLocaleTimeString(
'en-US',
options
);

let d=now.toLocaleDateString(
'en-US',
dateOptions
);

document.getElementById(id)
.innerHTML=t;

document.getElementById(dateId)
.innerHTML=d;

}

function refresh(){

updateClock(
"india",
"indiaDate",
"Asia/Kolkata"
);

updateClock(
"ny",
"nyDate",
"America/New_York"
);

updateClock(
"chi",
"chiDate",
"America/Chicago"
);

updateClock(
"den",
"denDate",
"America/Denver"
);

updateClock(
"la",
"laDate",
"America/Los_Angeles"
);

}

refresh();

setInterval(
refresh,
1000
);

</script>

</body>
</html>
