<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Florida Time Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
overflow:hidden;

background:
linear-gradient(
135deg,
#ff512f,
#dd2476,
#7b2ff7,
#00c6ff
);

display:flex;
flex-direction:column;
justify-content:center;

padding:18px;

color:white;

}

.title{

text-align:center;

font-size:42px;

font-weight:900;

margin-bottom:18px;

text-shadow:
0 0 20px white;

}

.grid{

display:grid;

height:85vh;

grid-template-columns:
repeat(3,1fr);

grid-template-rows:
1.2fr 1fr;

gap:14px;

}

.hero{

grid-column:1/4;

background:
linear-gradient(
135deg,
#ff9966,
#ff5e62
);

}

.clock{

border-radius:28px;

padding:22px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

backdrop-filter:blur(20px);

box-shadow:
0 20px 50px rgba(0,0,0,.3);

}

.card1{
background:
linear-gradient(
135deg,
#36d1dc,
#5b86e5
);
}

.card2{
background:
linear-gradient(
135deg,
#00f260,
#0575e6
);
}

.card3{
background:
linear-gradient(
135deg,
#fc466b,
#3f5efb
);
}

.card4{
background:
linear-gradient(
135deg,
#f7971e,
#ffd200
);
}

.city{

font-size:32px;

font-weight:800;

margin-bottom:10px;

}

.hero .city{
font-size:52px;
}

.time{

font-size:64px;

font-weight:900;

}

.hero .time{

font-size:92px;

}

.zone{

font-size:20px;

opacity:.95;

margin-top:10px;

}

.date{

margin-top:12px;

font-size:18px;

}

</style>

</head>

<body>

<div class="title">
🌴 FLORIDA CLOCKS 🌴
</div>

<div class="grid">

<div class="clock hero">

<div class="city">
Florida
</div>

<div class="time" id="main"></div>

<div class="zone">
Eastern Time • AM / PM
</div>

<div class="date" id="mainDate"></div>

</div>


<div class="clock card1">

<div class="city">
🏖 Miami
</div>

<div class="time" id="miami"></div>

<div class="zone">
Eastern
</div>

</div>


<div class="clock card2">

<div class="city">
🎢 Orlando
</div>

<div class="time" id="orlando"></div>

<div class="zone">
Eastern
</div>

</div>


<div class="clock card3">

<div class="city">
☀ Tampa
</div>

<div class="time" id="tampa"></div>

<div class="zone">
Eastern
</div>

</div>


<div class="clock card4">

<div class="city">
🌊 Pensacola
</div>

<div class="time" id="pensacola"></div>

<div class="zone">
Central
</div>

</div>


<div class="clock card1">

<div class="city">
🌅 Jacksonville
</div>

<div class="time" id="jax"></div>

<div class="zone">
Eastern
</div>

</div>

</div>

<script>

function show(id,zone,date=false){

let now=new Date();

let time=
now.toLocaleTimeString(
'en-US',
{
timeZone:zone,
hour:'2-digit',
minute:'2-digit',
second:'2-digit',
hour12:true
}
);

document
.getElementById(id)
.innerHTML=time;

if(date){

document
.getElementById(
id+"Date"
)
.innerHTML=

now.toLocaleDateString(
'en-US',
{
timeZone:zone,

weekday:'long',

month:'long',

day:'numeric'
}
);

}

}

function update(){

show(
"main",
"America/New_York",
true
);

show(
"miami",
"America/New_York"
);

show(
"orlando",
"America/New_York"
);

show(
"tampa",
"America/New_York"
);

show(
"jax",
"America/New_York"
);

show(
"pensacola",
"America/Chicago"
);

}

update();

setInterval(
update,
1000
);

</script>

</body>

</html>
